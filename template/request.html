{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!----======== CSS ======== -->
    <link href="{% static 'css/requeststyle.css'%}" rel="stylesheet">
     
    <!----===== Iconscout CSS ===== -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">

    <title>Responsive Regisration Form </title> 
</head>
<body>
    <!-- <div class="main"> -->
        <div class="wrapper">
            <nav>
            <div class="content">
                <div class="logo"><a href="#">LMS</a></div>
                <ul class="links">
                <li><a href="/home">Home</a></li>
                <li><a href="/request">Loundry Request</a></li>
                <li><a href="#Laptop">Loundry Status</a></li>
                <li><a href="/about">About</a></li>
                </ul>
            </div>
            <div class="rightlink"><a href="#">Logout</a></div>
            </nav>
        </div>

        <div class="container">
            <header>Loundry Requests</header>

            <form action="/" method="post">
                {% csrf_token %}
                {% load static %}
                <div class="form first">
                    <div class="details personal">
                        <span class="title">Personal Details</span>

                        <div class="fields">
                            <div class="input-field">
                                <label>Full Name</label>
                                <input type="text" placeholder="Enter your name" name='FullName'required>
                            </div>

                            <div class="input-field">
                                <label>Age</label>
                                <input type="number" placeholder="Enter your age" name='Age' required>
                            </div>

                            <div class="input-field">
                                <label>Email</label>
                                <input type="text" placeholder="Enter your email" name='Email' required>
                            </div>

                            <div class="input-field">
                                <label>Mobile Number</label>
                                <input type="tel" placeholder="Enter mobile number" name='Mobile' required>
                            </div>

                            <div class="input-field">
                                <label>Gender</label>
                                <input type="text" placeholder="Gender" name='Gender'required>
                                <!-- <select required>
                                    <option disabled selected>Select gender</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Others</option>
                                </select> -->
                            </div>

                            <div class="input-field">
                                <label>Others</label>
                                <input type="text" placeholder="Others Details!!" name='Others' required>
                            </div>
                        </div>
                    </div>

                    <!-- <div class="details ID"> -->
                        
                        <div class="details address">
                            <span class="title">Address Details</span>
        
                            <div class="fields">
                                <div class="input-field">
                                    <label>Address Type</label>
                                    <input type="text" placeholder="Permanent or Temporary" name='Address' required>
                                </div>
        
                                <div class="input-field">
                                    <label>Nationality</label>
                                    <input type="text" placeholder="Enter nationality" name='Nationality' required>
                                </div>
        
                                <div class="input-field">
                                    <label>State</label>
                                    <input type="text" placeholder="Enter your state" name='State' required>
                                </div>
        
                                <div class="input-field">
                                    <label>District</label>
                                    <input type="text" placeholder="Enter your district" name='District' required>
                                </div>
        
                                <div class="input-field">
                                    <label>Block Number</label>
                                    <input type="number" placeholder="Enter block number" name='Block' required>
                                </div>
        
                                <div class="input-field">
                                    <label>Ward Number</label>
                                    <input type="number" placeholder="Enter ward number" name='Ward' required>
                                </div>
                            </div>

                        <button class="nextBtn">
                            <span class="btnText">Next</span>
                            <i class="uil uil-navigator"></i>
                        </button>
                    </div> 
                </div>



    <!-- // 2nd Form -->

                <div class="form second">
                    <div class="details ID">
                        <span class="title">Loundry Details</span>

                        <div class="fields">
                            <div class="input-field">
                                <label>Loundry Type</label>
                                <input type="text" placeholder="Enter Loundry type" name='laundry' required>
                            </div>

                            <div class="input-field">
                                <label>Number Of Cloths</label>
                                <input type="number" placeholder="Enter number of cloths" name='Cloths' required>
                            </div>

                            <div class="input-field">
                                <label>Number of KG Cloths</label>
                                <input type="number" placeholder="Enter number of KG cloths" name='Weight' required>
                            </div>

                            <div class="input-field">
                                <label>Descriptions</label>
                                <input type="text" placeholder="Descriptions" name='Descriptions'required>
                            </div>

                            <div class="input-field">
                                <label>Issued Date</label>
                                <input type="date" placeholder="Enter your issued date" name='Issued' required>
                            </div>

                            <div class="input-field">
                                <label>Delievry Date</label>
                                <input type="date" placeholder="Enter delievry date" name='Delievry' required>
                            </div>
                        </div>
                    </div>

                        <div class="buttons">
                            <div class="backBtn">
                                <i class="uil uil-navigator"></i>
                                <span class="btnText">Back</span>
                            </div>
                            
                            <button class="sumbit">
                                <span class="btnText">Submit</span>
                                <i class="uil uil-navigator"></i>
                            </button>
                        </div>
                    </div> 
                </div>
            </form>
        </div>

        <script src="../static/Javascript/script.js"></script>
    <!-- </div> -->
</body>
</html>
