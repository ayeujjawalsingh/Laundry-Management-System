<body>

        <div class="wrapper">

            <div class="content">
                <div class="logo"><a href="#">LMS</a></div>

        <div class="container">
            <header>Loundry Requests</header>

            <form action="#">
                <div class="form first">
                    <div class="details personal">
                        <span class="title">Personal Details</span>

                        <div class="fields">
                            <div class="input-field">
                                <label>Full Name</label>
                                <input type="text" placeholder="Enter your name" required>
                            </div>

                            <div class="input-field">
                                <label>Age</label>
                                <input type="number" placeholder="Enter your age" required>
                            </div>

                            <div class="input-field">
                                <label>Email</label>
                                <input type="text" placeholder="Enter your email" required>
                            </div>

                            <div class="input-field">
                                <label>Mobile Number</label>
                                <input type="tel" placeholder="Enter mobile number" required>
                            </div>

                            <div class="input-field">
                                <label>Gender</label>
                                <select required>
                                    <option disabled selected>Select gender</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Others</option>
                                </select>
                            </div>

                            <div class="input-field">
                                <label>Others</label>
                                <input type="text" placeholder="Others Details!!" required>
                            </div>
                        </div>
                    </div>

                    <!-- <div class="details ID"> -->
                        
                        <div class="details address">
                            <span class="title">Address Details</span>
        
                            <div class="fields">
                                <div class="input-field">
                                    <label>Address Type</label>
                                    <input type="text" placeholder="Permanent or Temporary" required>
                                </div>
        
                                <div class="input-field">
                                    <label>Nationality</label>
                                    <input type="text" placeholder="Enter nationality" required>
                                </div>
        
                                <div class="input-field">
                                    <label>State</label>
                                    <input type="text" placeholder="Enter your state" required>
                                </div>
        
                                <div class="input-field">
                                    <label>District</label>
                                    <input type="text" placeholder="Enter your district" required>
                                </div>
        
                                <div class="input-field">
                                    <label>Block Number</label>
                                    <input type="number" placeholder="Enter block number" required>
                                </div>
        
                                <div class="input-field">
                                    <label>Ward Number</label>
                                    <input type="number" placeholder="Enter ward number" required>
                                </div>
                            </div>

                        <button class="nextBtn">
                            <span class="btnText">Next</span>
                            <i class="uil uil-navigator"></i>
                        </button>
                    </div> 
                </div>



    <!-- // 2nd Form -->

                <div class="form second">
                    <div class="details ID">
                        <span class="title">Loundry Details</span>

                        <div class="fields">
                            <div class="input-field">
                                <label>Loundry Type</label>
                                <input type="text" placeholder="Enter Loundry type" required>
                            </div>

                            <div class="input-field">
                                <label>Number Of Cloths</label>
                                <input type="number" placeholder="Enter number of cloths" required>
                            </div>

                            <div class="input-field">
                                <label>Number of KG Cloths</label>
                                <input type="number" placeholder="Enter number of KG cloths" required>
                            </div>

                            <div class="input-field">
                                <label>Descriptions</label>
                                <input type="text" placeholder="Descriptions" required>
                            </div>

                            <div class="input-field">
                                <label>Issued Date</label>
                                <input type="date" placeholder="Enter your issued date" required>
                            </div>

                            <div class="input-field">
                                <label>Delievry Date</label>
                                <input type="date" placeholder="Enter delievry date" required>
                            </div>
                        </div>
                    </div>
