<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Footer Section</title>
    <link rel="stylesheet" href="{% static 'css/footerstyle.css'%}">
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <!-- <div class="content1">
      <div class="text">Fully Responsive Footer Section</div>
      <div class="p">HTML and CSS (Flexbox)</div>
    </div> -->
    <footer>
      <div class="main-content">
        <div class="left box">
          <h2>About us</h2>
          <div class="content">
            <p>Hi, This website serves as a laundry management system, allowing you to send me laundry requests and check on their status at the same time.</p>
            <div class="social">
              <a href="https://facebook.com/ayeujjawalsingh/"><span class="fab fa-facebook-f"></span></a>
              <a href="https://www.linkedin.com/in/ayeujjawalsingh/"><span class="fab fa-linkedin-in"></span></a>
              <a href="https://instagram.com/ayeujjawalsingh"><span class="fab fa-instagram"></span></a>
              <a href="https://github.com/ayeujjawalsingh"><span class="fab fa-github"></span></a>
            </div>
          </div>
        </div>
        <div class="center box">
          <h2>Address</h2>
          <div class="content">
            <div class="place">
              <span class="fas fa-map-marker-alt"></span>
              <span class="text">Bhubhaneshwar, Odisha</span>
            </div>
            <div class="phone">
              <span class="fas fa-phone-alt"></span>
              <span class="text">+919608734736</span>
            </div>
            <div class="email">
              <span class="fas fa-envelope"></span>
              <span class="text">ayeujjawalsingh@gmail.com</span>
            </div>
          </div>
        </div>

        <div class="right box">
          <h2>Contact us</h2>
          <div class="content">
            <form action="#">
              <div class="email">
                <div class="text">Email *</div>
                <input type="email" required>
              </div>
              <div class="msg">
                <div class="text">Message *</div>
                <textarea rows="2" cols="25" required></textarea>
              </div>
              <div class="btn">
                <button type="submit">Send</button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="bottom">
        <center>
          <span class="credit">Created By <a href="https://github.com/ayeujjawalsingh">Ujjawal Singh</a> | </span>
        </center>
      </div>
    </footer>

  </body>
</html>
